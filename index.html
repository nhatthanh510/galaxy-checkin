<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Galaxy Nails Check-In</title>
    <meta
      name="description"
      content="Galaxy Nails check-in — fast salon check-in, loyalty rewards, and birthday perks."
    />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.). Uses absolute URLs so
         social crawlers can fetch the 1200x630 share image. Update og:url /
         og:image if the deployed domain changes. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Galaxy Nails Check-In" />
    <meta property="og:title" content="Galaxy Nails Check-In" />
    <meta
      property="og:description"
      content="Fast salon check-in, loyalty rewards, and birthday perks."
    />
    <meta property="og:url" content="https://go-checkin.vercel.app/" />
    <meta property="og:image" content="https://go-checkin.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Galaxy Nails" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Galaxy Nails Check-In" />
    <meta
      name="twitter:description"
      content="Fast salon check-in, loyalty rewards, and birthday perks."
    />
    <meta name="twitter:image" content="https://go-checkin.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
